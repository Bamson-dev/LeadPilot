# Production — Contabo VPS (backend only)
# Usage: docker compose --env-file .env.production up -d --build

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: leadpilot-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
    # Required for stable Chromium in Docker
    shm_size: "512mb"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
