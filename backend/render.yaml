services:
  type: web
  name: leadpilot-backend
  env: docker
  dockerfilePath: ./backend/Dockerfile
  healthCheckPath: /health
  envVars:
    - key: NODE_ENV
      value: production
    - key: SUPABASE_URL
      sync: false
    - key: SUPABASE_SERVICE_KEY
      sync: false
    - key: SCRAPER_CONCURRENCY
      value: "3"
    - key: FRONTEND_URL
      sync: false
